<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Login Admin - SMKN Riung</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#0d6efd;
}

.login-card{
    max-width:400px;
    margin:80px auto;
    padding:30px;
    border-radius:15px;
    background:white;
    box-shadow:0px 10px 25px rgba(0,0,0,.2);
}

.logo{
    width:90px;
    display:block;
    margin:auto;
}
</style>

</head>
<body>

<div class="container">

<div class="login-card">

<img src="assets/logo.png" class="logo">

<h3 class="text-center mt-3">
SMKN RIUNG
</h3>

<p class="text-center">
Login Administrator
</p>

<div class="mb-3">

<label>Email</label>

<input
type="email"
id="email"
class="form-control"
placeholder="admin@smknriung.sch.id">

</div>

<div class="mb-3">

<label>Password</label>

<input
type="password"
id="password"
class="form-control"
placeholder="********">

</div>

<button
class="btn btn-primary w-100"
onclick="loginAdmin()">

LOGIN

</button>

<div
id="pesan"
class="text-danger mt-3 text-center">

</div>

</div>

</div>

<script type="module" src="js/auth.js"></script>

</body>
</html>
